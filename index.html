<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorial Digital</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    background:#f5f1ea;
    color:#3b322c;
}

.container{
    max-width:700px;
    margin:auto;
    padding:40px 20px;
}

/* TOPO */
.hero{
    text-align:center;
    padding:100px 20px 50px;
}

.hero h1{
    font-size:42px;
    font-weight:400;
    margin:0;
}

.hero p{
    font-size:18px;
    color:#7a6e64;
}

/* FRASE */
.frase{
    text-align:center;
    font-size:20px;
    margin:40px 0;
    line-height:1.6;
}

/* BOTÕES */
.buttons{
    text-align:center;
    margin:30px 0;
}

.btn{
    display:inline-block;
    padding:14px 26px;
    margin:6px;
    border-radius:30px;
    text-decoration:none;
    background:#d6b98c;
    color:#fff;
}

/* CONTADOR */
.stats{
    text-align:center;
    margin:30px 0;
    font-size:16px;
}

/* FEED */
.feed{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-top:40px;
}

.item{
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.footer{
    text-align:center;
    padding:40px;
    color:#8a7f74;
}
</style>
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>Maria Aparecida Silva</h1>
        <p>1948 — 2026</p>
    </div>

    <div class="frase">
        “Sempre em nossos corações.<br>
        Sua memória viverá para sempre.”
    </div>

    <div class="buttons">
        <a href="https://mpago.la/2dAt9LF" class="btn" target="_blank">
            Acender vela ✨ (R$0,99)
        </a>
    </div>

    <div class="stats">
        ✨ 18 velas • 💬 7 homenagens
    </div>

    <div class="feed">
        <div class="item">
            <strong>Guilherme</strong> acendeu uma vela ✨
        </div>

        <div class="item">
            <strong>Ana:</strong> “Saudades eternas”
        </div>

        <div class="item">
            <strong>Marcos</strong> acendeu uma vela ✨
        </div>
    </div>

</div>

<div class="footer">
Memorial Digital
</div>

</body>
</html>
