<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorial Digital</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    background:#f5f1ea;
    color:#3b322c;
}

.container{
    max-width:700px;
    margin:auto;
    padding:40px 20px;
}

.hero{
    text-align:center;
    padding:80px 20px 30px;
}

.hero h1{
    font-size:42px;
    font-weight:400;
    margin:0;
}

.hero p{
    color:#7a6e64;
}

.frase{
    text-align:center;
    font-size:20px;
    margin:30px 0;
}

.stats{
    text-align:center;
    margin:20px 0;
}

.btn{
    display:inline-block;
    padding:14px 26px;
    margin:6px;
    border-radius:30px;
    text-decoration:none;
    background:#d6b98c;
    color:#fff;
    border:none;
}

.form-homenagem{
    text-align:center;
    margin-top:30px;
}

input, textarea{
    width:80%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:10px;
    font-family: Georgia;
}

.feed{
    background:#fff;
    border-radius:16px;
    padding:20px;
    margin-top:40px;
}

.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.footer{
    text-align:center;
    padding:40px;
    color:#8a7f74;
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<h1>Maria Aparecida Silva</h1>
<p>1948 — 2026</p>
</div>

<div class="frase">
“Uma pequena luz pode representar um grande amor.”
</div>

<div class="stats">
✨ 18 velas • 💬 7 homenagens
</div>

<div class="form-homenagem">

<input id="nomePessoa" type="text" placeholder="Seu nome">

<textarea id="mensagemPessoa" placeholder="Escreva sua homenagem"></textarea>

<button onclick="publicarHomenagem()" class="btn">
Publicar homenagem
</button>

<br>

<a id="btnPagamento" class="btn" style="display:none;" target="_blank">
Acender vela ✨ (R$0,99)
</a>

<a id="btnCompartilhar" class="btn" style="display:none;" target="_blank">
Compartilhar homenagem
</a>

</div>

<div class="feed" id="feed">
<h3>Homenagens recentes</h3>

<div class="item">Guilherme acendeu uma vela ✨</div>
<div class="item">Ana: “Saudades eternas”</div>

</div>

</div>

<div class="footer">
Memorial Digital
</div>

<script>
function publicarHomenagem(){

const nome = document.getElementById("nomePessoa").value;
const mensagem = document.getElementById("mensagemPessoa").value;

if(!nome || !mensagem){
alert("Preencha seu nome e a mensagem");
return;
}

// adiciona no feed
const feed = document.getElementById("feed");

const novo = document.createElement("div");
novo.className = "item";
novo.innerHTML = "<strong>" + nome + "</strong>: " + mensagem;

feed.prepend(novo);

// botão pagamento
const btnPagamento = document.getElementById("btnPagamento");
btnPagamento.style.display = "inline-block";
btnPagamento.href = "https://mpago.la/2dAt9LF";

// botão compartilhar
const texto = `Eu, ${nome}, deixei uma homenagem:\n"${mensagem}"\n\nVeja aqui: ${window.location.href}`;
const linkWhats = "https://wa.me/?text=" + encodeURIComponent(texto);

const btnCompartilhar = document.getElementById("btnCompartilhar");
btnCompartilhar.style.display = "inline-block";
btnCompartilhar.href = linkWhats;

}
</script>

</body>
</html>
