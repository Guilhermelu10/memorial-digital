<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorial Digital</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    background:#f6f2eb;
    color:#3d352f;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.hero{
    text-align:center;
    padding:80px 20px;
    border-bottom:1px solid #e5ddd2;
}

.hero h1{
    font-size:52px;
    font-weight:400;
    margin-bottom:10px;
}

.hero p{
    font-size:20px;
    color:#6b6158;
}

.message{
    text-align:center;
    font-size:24px;
    margin:50px 0;
    line-height:1.8;
}

.stats{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:40px 0;
    font-size:20px;
}

.buttons{
    text-align:center;
    margin:40px 0;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    margin:8px;
    border-radius:30px;
    text-decoration:none;
    background:#cdb18c;
    color:white;
    font-size:16px;
}

.feed{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
    margin-top:50px;
}

.feed h2{
    text-align:center;
    font-weight:400;
}

.item{
    padding:20px 0;
    border-bottom:1px solid #eee;
}

.footer{
    text-align:center;
    padding:40px;
    color:#8a7f74;
}
</style>
</head>
<body>

<div class="container">

    <section class="hero">
        <h1>Maria Aparecida Silva</h1>
        <p>1948 — 2026</p>
    </section>

    <section class="message">
        “Sempre em nossos corações.<br>
        Sua memória viverá para sempre.”
    </section>

    <div class="stats">
        <div>✨ 18 velas</div>
        <div>💬 7 homenagens</div>
    </div>

    <div class="buttons">
        <a href="https://mpago.la/2dAt9LF" class="btn" target="_blank">
            Acender vela por R$ 0,99
        </a>

        <a href="#" class="btn">
            Deixar homenagem
        </a>
    </div>

    <section class="feed">
        <h2>Homenagens Recentes</h2>

        <div class="item">
            <strong>Guilherme</strong><br>
            acendeu uma vela ✨
        </div>

        <div class="item">
            <strong>Ana</strong><br>
            “Saudades eternas”
        </div>

        <div class="item">
            <strong>Marcos</strong><br>
            acendeu uma vela ✨
        </div>
    </section>

</div>

<div class="footer">
    Memorial Digital
</div>

</body>
</html>
