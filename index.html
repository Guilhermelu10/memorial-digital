<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxg5ydKAyGW9aV0R8TbFXN2tbQP_t1T9qGu1Hll0ZxokUd8kLg83u9_RAHxv3VlWVvk/exec";

let velas = 248;
let msgs = 92;

function atualizar(){
    document.getElementById("contador").innerHTML =
    `✨ ${velas} velas • 💬 ${msgs} homenagens`;
}

async function carregarHomenagens(){
    try{
        const resposta = await fetch(API_URL);
        const dados = await resposta.json();

        const feed = document.getElementById("feed");
        feed.innerHTML = "<h3>Homenagens recentes</h3>";

        dados.reverse().forEach(item => {
            let novo = document.createElement("div");
            novo.className = "item";

            novo.innerHTML = `
                <strong>${item.nome}</strong>: "${item.mensagem}"
                <div class="time">recentemente</div>
            `;

            feed.appendChild(novo);
        });

        msgs = 92 + dados.length;
        atualizar();

    }catch(error){
        console.error(error);
    }
}

async function publicar(){

    let nome = document.getElementById("nomePessoa").value.trim();
    let msg = document.getElementById("mensagemPessoa").value.trim();

    if(!nome || !msg){
        alert("Preencha os campos");
        return;
    }

    let formData = new FormData();
    formData.append("nome", nome);
    formData.append("mensagem", msg);

    try{

        await fetch(API_URL,{
            method:"POST",
            body: formData
        });

        document.getElementById("sucessoBox").style.display = "block";

        let btnP = document.getElementById("btnPagamento");
        btnP.style.display = "inline-block";
        btnP.href = "https://mpago.la/2dAt9LF";

        let texto = `Acabei de deixar uma homenagem emocionante ❤️

"${msg}"

Veja aqui: ${window.location.href}`;

        let link = "https://wa.me/?text=" + encodeURIComponent(texto);

        let btnW = document.getElementById("btnCompartilhar");
        btnW.style.display = "inline-block";
        btnW.href = link;

        document.getElementById("incentivo").style.display = "block";

        setTimeout(()=>{
            carregarHomenagens();
        },1000);

    }catch(error){
        console.error(error);
        alert("Erro ao enviar homenagem");
    }
}

setInterval(()=>{
    velas += Math.floor(Math.random() * 2) + 1;
    atualizar();
},15000);

carregarHomenagens();

</script>
